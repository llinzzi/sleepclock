<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleep Clock Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', 'SF Mono', 'Consolas', monospace;
      color: #888;
    }

    h1 {
      color: #555;
      font-size: 14px;
      font-weight: 400;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .screen-container {
      position: relative;
      border: 2px solid #1a1a1a;
      border-radius: 4px;
      padding: 8px;
      background: #111;
    }

    #canvas {
      display: block;
      width: 512px;
      height: 128px;
      image-rendering: pixelated;
      border-radius: 2px;
      background: #000;
    }

    .controls {
      margin-top: 30px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #888;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    button:hover {
      background: #252525;
      border-color: #444;
      color: #aaa;
    }

    button:active {
      transform: scale(0.98);
    }

    .status {
      margin-top: 20px;
      font-size: 12px;
      color: #444;
    }

    .info {
      margin-top: 40px;
      font-size: 11px;
      color: #333;
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <h1>SLEEP CLOCK</h1>
  <div class="screen-container">
    <canvas id="canvas" width="256" height="64"></canvas>
  </div>

  <div class="controls">
    <button id="btnWake">唤醒 (Wake)</button>
    <button id="btnSleep">待机 (Sleep)</button>
    <button id="btnStar">星辰 (Stars)</button>
    <button id="btnWeather">天气 (Weather)</button>
    <button id="btnHourly">12小时 (Hourly)</button>
    <button id="btnDaytime">日间 (Day)</button>
  </div>

  <div class="status" id="status">待机模式</div>

  <div class="info">
    分辨率: 256×64 | 灰度: I4 (16级) | SSD1322 OLED<br>
    唤醒时间 &gt; 07:00 显示天气
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');

    // I4 grayscale palette (16 levels: 0-15)
    const gray = (level) => {
      const v = Math.round((level / 15) * 255);
      return `rgb(${v},${v},${v})`;
    };

    // State
    let mode = 'sleep'; // sleep, wake, star, weather, hourly, daytime
    let brightness = 0; // 0-15
    let stars = [];
    let breathPhase = 0;
    let weatherData = null;
    let hourlyForecast = []; // Store 24-hour forecast

    // QWeather API credentials
    const QWEATHER_HOST = 'nn3aaqw4wr.re.qweatherapi.com';
    const QWEATHER_TOKEN = 'K4WMKGH9VV';
    const QWEATHER_KEY = 'e8e879aca230481f9201f67de0583184';
    const HANGZHOU_LOCATION = '120.15,30.27'; // 经度,纬度

    // Weather icons mapping
    const weatherIcons = {
      '100': '晴',
      '101': '多云',
      '102': '少云',
      '103': '晴间多云',
      '104': '阴',
      '150': '晴',
      '151': '多云',
      '152': '少云',
      '153': '晴间多云',
      '154': '阴',
      '300': '轻毛毛雨',
      '301': '毛毛雨',
      '302': '重毛毛雨',
      '303': '小雨',
      '304': '中雨',
      '305': '大雨',
      '306': '极端降雨',
      '307': '大暴雨',
      '308': '特大暴雨',
      '309': '冻毛毛雨',
      '310': '冻雨',
      '311': '冰雨',
      '312': '极端冰雨',
      '313': '小冰雹',
      '314': '中冰雹',
      '315': '大冰雹',
      '316': '冰粒',
      '317': '冻雾',
      '318': '雾',
      '350': '阵雨',
      '360': '雷阵雨',
      '399': '雨',
      '400': '小雪',
      '401': '中雪',
      '402': '大雪',
      '403': '极端降雪',
      '404': '冻雪',
      '405': '雪粒',
      '406': '阵雪',
      '407': '雪夹雾',
      '408': '雪',
      '409': '大雪',
      '410': '雷暴雪',
      '499': '雪',
      '500': '雾',
      '501': '薄雾',
      '502': '浓雾',
      '503': '冻雾',
      '504': '冻雾',
      '507': '沙尘',
      '508': '扬沙',
      '509': '雾',
      '510': '浓雾',
      '511': '冻雾',
      '512': '冻雾',
      '513': '雾',
      '514': '冻雾',
      '515': '冻雾',
      '900': '热',
      '901': '冷',
      '999': '未知',
    };

    // Real weather from QWeather API (Hangzhou)
    async function fetchWeather() {
      try {
        // Fetch hourly forecast (24h)
        const hourlyResponse = await fetch(
          `https://${QWEATHER_HOST}/v7/weather/24h?location=${HANGZHOU_LOCATION}`,
          {
            headers: {
              'Authorization': `Bearer ${QWEATHER_TOKEN}`,
              'X-QW-Api-Key': QWEATHER_KEY,
            }
          }
        );
        const hourlyData = await hourlyResponse.json();

        // Fetch daily forecast
        const dailyResponse = await fetch(
          `https://${QWEATHER_HOST}/v7/weather/7d?location=${HANGZHOU_LOCATION}`,
          {
            headers: {
              'Authorization': `Bearer ${QWEATHER_TOKEN}`,
              'X-QW-Api-Key': QWEATHER_KEY,
            }
          }
        );
        const dailyData = await dailyResponse.json();

        if (hourlyData.code !== '200' || dailyData.code !== '200') {
          throw new Error('API error');
        }

        const now = new Date();
        const currentHour = now.getHours();

        // Store hourly data for next 12 hours
        hourlyForecast = [];
        const hourlyList = hourlyData.hourly || [];
        for (let i = 0; i < 12 && i < hourlyList.length; i++) {
          const h = hourlyList[i];
          const fxTime = new Date(h.fxTime);
          hourlyForecast.push({
            hour: fxTime.getHours(),
            temp: parseInt(h.temp),
            rain_prob: parseInt(h.precip),
            rain_mm: parseFloat(h.precip),
            condition: h.icon,
            conditionLabel: weatherIcons[h.icon] || h.text || '未知',
          });
        }

        // Current weather
        const current = hourlyList.find(h => {
          const fxTime = new Date(h.fxTime);
          return fxTime.getHours() === currentHour;
        }) || hourlyList[0];

        const today = dailyData.daily?.[0];

        weatherData = {
          city: '杭州',
          temp: parseInt(current.temp),
          condition: current.icon,
          conditionLabel: weatherIcons[current.icon] || current.text || '晴',
          humidity: parseInt(current.humidity),
          rain_prob: parseInt(current.precip),
          rain_amount: parseFloat(current.precip),
          temp_max: today ? parseInt(today.tempMax) : 30,
          temp_min: today ? parseInt(today.tempMin) : 20,
          wind: `${current.windDir} ${current.windScale}级`,
          loading: false,
        };
      } catch (e) {
        console.error('Weather fetch error:', e);
        // Generate fallback hourly data
        const now = new Date();
        const currentHour = now.getHours();
        hourlyForecast = [];
        for (let i = 0; i < 12; i++) {
          const h = (currentHour + i) % 24;
          const isRain = Math.random() > 0.7;
          hourlyForecast.push({
            hour: h,
            temp: 20 + Math.floor(Math.random() * 10),
            rain_prob: isRain ? 50 + Math.floor(Math.random() * 50) : Math.floor(Math.random() * 30),
            rain_mm: isRain ? Math.random() * 5 : 0,
            condition: isRain ? '300' : '100',
            conditionLabel: isRain ? '小雨' : '晴',
          });
        }
        weatherData = {
          city: '杭州',
          temp: 25,
          condition: '100',
          conditionLabel: '晴',
          humidity: 50,
          rain_prob: 0,
          rain_amount: 0,
          temp_max: 28,
          temp_min: 18,
          wind: '东南风 2级',
          loading: false,
        };
      }
      return weatherData;
    }

    // Initialize stars
    function initStars() {
      stars = [];
      for (let i = 0; i < 30; i++) {
        stars.push({
          x: Math.random() * 256,
          y: Math.random() * 64,
          size: Math.random() < 0.3 ? 2 : 1,
          brightness: Math.floor(Math.random() * 4) + 2,
        });
      }
    }

    // Draw star field
    function drawStars() {
      stars.forEach(star => {
        const flicker = Math.sin(breathPhase * 3 + star.x) * 0.5 + 0.5;
        const b = Math.floor(star.brightness * flicker);
        ctx.fillStyle = gray(Math.min(b + 2, 15));
        ctx.fillRect(Math.floor(star.x), Math.floor(star.y), star.size, star.size);
      });
    }

    // Draw time
    function drawTime(b) {
      if (b < 2) return;

      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      const timeStr = `${h}:${m}`;

      // Breathing effect
      const breath = Math.sin(breathPhase * 0.5) * 0.5 + 0.5;
      const baseBrightness = Math.min(b, 11);
      const textBrightness = Math.floor(baseBrightness + breath * 2);
      const shadowBrightness = Math.floor(textBrightness - 3);

      ctx.font = 'bold 24px "Orbitron", "IBM Plex Mono", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Shadow (offset)
      ctx.fillStyle = gray(Math.max(shadowBrightness, 0));
      ctx.fillText(timeStr, 129, 25);

      // Main text
      ctx.fillStyle = gray(Math.min(textBrightness, 15));
      ctx.fillText(timeStr, 128, 24);

      // Status dot
      const dotBrightness = Math.floor(5 + breath * 2);
      ctx.fillStyle = gray(dotBrightness);
      ctx.beginPath();
      ctx.arc(128, 45, 1.5, 0, Math.PI * 2);
      ctx.fill();

      return textBrightness;
    }

    // Draw hourly forecast (compact)
    function drawHourly(b) {
      if (b < 2 || hourlyForecast.length === 0) return;

      const breath = Math.sin(breathPhase * 0.5) * 0.5 + 0.5;
      const textBrightness = Math.floor(Math.min(b, 12) + breath);

      // Title
      ctx.font = '8px "IBM Plex Mono", monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = gray(textBrightness - 4);
      ctx.fillText('12小时预报', 128, 8);

      // Draw 6 hours in first row, 6 in second
      const colWidth = 42;
      const startX = 6;

      for (let i = 0; i < Math.min(12, hourlyForecast.length); i++) {
        const h = hourlyForecast[i];
        const col = i % 6;
        const row = Math.floor(i / 6);
        const x = startX + col * colWidth;
        const y = row === 0 ? 18 : 44;

        // Hour
        ctx.font = '7px "IBM Plex Mono", monospace';
        ctx.fillStyle = gray(textBrightness - 5);
        ctx.textAlign = 'center';
        ctx.fillText(`${h.hour}:00`, x + 18, y);

        // Rain bar (height proportional to rain probability)
        const barHeight = Math.round((h.rain_prob / 100) * 16);
        ctx.fillStyle = gray(textBrightness - 2);
        ctx.fillRect(x + 14, y + 4, 8, 16 - barHeight);

        // Temperature
        ctx.font = 'bold 8px "IBM Plex Mono", monospace';
        ctx.fillStyle = gray(textBrightness);
        ctx.fillText(`${h.temp}°`, x + 18, y + 14);

        // Rain probability
        ctx.font = '6px "IBM Plex Mono", monospace';
        ctx.fillStyle = gray(textBrightness - 5);
        ctx.fillText(`${h.rain_prob}%`, x + 18, y + 22);
      }

      // Bottom dot
      const dotBrightness = Math.floor(5 + breath * 2);
      ctx.fillStyle = gray(dotBrightness);
      ctx.beginPath();
      ctx.arc(248, 58, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Draw daytime forecast (8am-8pm, 12 hours) - dark artistic version
    function drawDaytime(b) {
      if (b < 2 || hourlyForecast.length === 0) return;

      const breath = Math.sin(breathPhase * 0.5) * 0.5 + 0.5;
      const textBrightness = Math.floor(Math.min(b, 11) + breath);
      const now = new Date();

      // Filter 8am-8pm data
      let daytimeData = [];
      for (let i = 0; i < hourlyForecast.length; i++) {
        const h = hourlyForecast[i];
        if (h.hour >= 8 && h.hour <= 20) {
          daytimeData.push(h);
        }
      }
      if (daytimeData.length === 0) {
        daytimeData = hourlyForecast.slice(0, 12);
      }
      daytimeData = daytimeData.slice(0, 12);

      // === BLACK BACKGROUND ===
      ctx.fillStyle = gray(0);
      ctx.fillRect(0, 0, 256, 64);

      // === RAIN ANIMATION (at rain hours) ===
      const rainAnimY = Math.floor(breathPhase * 20) % 50;
      for (let i = 0; i < daytimeData.length; i++) {
        const h = daytimeData[i];
        const x = 8 + i * 20;

        if (h.rain_prob >= 30) {
          // Draw falling rain drops
          const dropCount = Math.floor(h.rain_prob / 15);
          for (let d = 0; d < dropCount; d++) {
            const dropY = (rainAnimY + d * 12) % 50;
            ctx.fillStyle = gray(textBrightness - 5);
            ctx.fillRect(x + d * 4, dropY + 5, 1, 4);
          }
        }
      }

      // === TEMPERATURE CURVE ===
      const tempMin = Math.min(...daytimeData.map(h => h.temp));
      const tempMax = Math.max(...daytimeData.map(h => h.temp));
      const tempRange = tempMax - tempMin || 1;
      const chartTop = 8;
      const chartBottom = 45;

      // Draw curve line
      ctx.strokeStyle = gray(textBrightness);
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i < daytimeData.length; i++) {
        const h = daytimeData[i];
        const x = 8 + i * 20;
        const y = chartBottom - ((h.temp - tempMin) / tempRange) * (chartBottom - chartTop);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Draw dots and temp labels
      for (let i = 0; i < daytimeData.length; i++) {
        const h = daytimeData[i];
        const x = 8 + i * 20;
        const y = chartBottom - ((h.temp - tempMin) / tempRange) * (chartBottom - chartTop);

        // Dot
        ctx.fillStyle = gray(textBrightness + 2);
        ctx.beginPath();
        ctx.arc(x, y, 2, 0, Math.PI * 2);
        ctx.fill();

        // Temp above dot
        ctx.font = 'bold 7px "IBM Plex Mono", monospace';
        ctx.fillStyle = gray(textBrightness - 2);
        ctx.textAlign = 'center';
        ctx.fillText(`${h.temp}°`, x, y - 4);

        // Hour label below
        ctx.font = '6px "IBM Plex Mono", monospace';
        ctx.fillStyle = gray(textBrightness - 5);
        ctx.fillText(`${h.hour}`, x, 54);
      }

      // === CURRENT TIME (top right) ===
      const currentTime = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
      ctx.font = 'bold 10px "Orbitron", monospace';
      ctx.textAlign = 'right';
      ctx.fillStyle = gray(textBrightness);
      ctx.fillText(currentTime, 252, 12);

      // === CURRENT WEATHER (bottom left) ===
      if (weatherData) {
        ctx.font = '7px "IBM Plex Mono", monospace';
        ctx.textAlign = 'left';
        ctx.fillStyle = gray(textBrightness - 3);
        ctx.fillText(weatherData.conditionLabel, 4, 62);

        // Rain now
        ctx.textAlign = 'right';
        ctx.fillText(`降${weatherData.rain_prob}%`, 252, 62);
      }

      // === TIME AXIS LINE ===
      ctx.strokeStyle = gray(textBrightness - 6);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(8, 48);
      ctx.lineTo(248, 48);
      ctx.stroke();

      // Start/end labels
      ctx.font = '6px "IBM Plex Mono", monospace';
      ctx.fillStyle = gray(textBrightness - 5);
      ctx.textAlign = 'left';
      ctx.fillText('8时', 4, 51);
      ctx.textAlign = 'right';
      ctx.fillText('20时', 252, 51);
    }
    function drawWeather(b) {
      if (b < 2 || !weatherData || weatherData.loading) return;

      const breath = Math.sin(breathPhase * 0.5) * 0.5 + 0.5;
      const textBrightness = Math.floor(Math.min(b, 12) + breath);

      // Time (top left, small)
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      ctx.font = '8px "Orbitron", "IBM Plex Mono", monospace';
      ctx.textAlign = 'left';
      ctx.fillStyle = gray(textBrightness - 5);
      ctx.fillText(`${h}:${m}`, 8, 10);

      // City & date (top center)
      ctx.textAlign = 'center';
      ctx.font = '8px "IBM Plex Mono", monospace';
      ctx.fillStyle = gray(textBrightness - 4);
      const dateStr = `${weatherData.city} ${weatherData.temp_max}°/${weatherData.temp_min}°`;
      ctx.fillText(dateStr, 128, 10);

      // Temperature (large)
      ctx.font = 'bold 20px "Orbitron", "IBM Plex Mono", monospace';
      ctx.fillStyle = gray(Math.min(textBrightness + 2, 15));
      ctx.fillText(`${weatherData.temp}°`, 60, 32);

      // Weather condition
      ctx.font = '10px "IBM Plex Mono", monospace';
      ctx.fillStyle = gray(textBrightness);
      ctx.fillText(weatherData.conditionLabel, 128, 30);

      // Rain probability (right side)
      ctx.font = '9px "IBM Plex Mono", monospace';
      ctx.fillStyle = gray(textBrightness - 2);
      ctx.textAlign = 'right';
      ctx.fillText(`降水 ${weatherData.rain_prob}%`, 248, 28);
      if (weatherData.rain_amount > 0) {
        ctx.fillText(`雨量 ${weatherData.rain_amount.toFixed(1)}mm`, 248, 40);
      }

      // Bottom info
      ctx.textAlign = 'center';
      ctx.font = '7px "IBM Plex Mono", monospace';
      ctx.fillStyle = gray(textBrightness - 5);
      ctx.fillText(weatherData.wind, 128, 50);

      // Bottom dot
      const dotBrightness = Math.floor(5 + breath * 2);
      ctx.fillStyle = gray(dotBrightness);
      ctx.beginPath();
      ctx.arc(128, 58, 1, 0, Math.PI * 2);
      ctx.fill();
    }

    // Main render loop
    function render() {
      // Clear to black
      ctx.fillStyle = gray(0);
      ctx.fillRect(0, 0, 256, 64);

      const now = new Date();
      const hour = now.getHours();

      if (mode === 'sleep') {
        // Just ambient noise (dithering effect)
        for (let i = 0; i < 20; i++) {
          const x = Math.floor(Math.random() * 256);
          const y = Math.floor(Math.random() * 64);
          ctx.fillStyle = gray(1);
          ctx.fillRect(x, y, 1, 1);
        }
        brightness = Math.max(0, brightness - 0.5);
      } else if (mode === 'wake') {
        // 20:00-06:59: Star mode
        // 07:00-19:59: Weather mode
        if (hour >= 20 || hour < 7) {
          // Night mode - stars + time
          drawStars();
          drawTime(Math.max(brightness, 5));
          brightness = Math.min(15, brightness + 0.3);
        } else {
          // Day mode - weather + time
          if (!weatherData) fetchWeather();
          drawWeather(brightness);
          brightness = Math.min(15, brightness + 0.3);
        }
      } else if (mode === 'weather') {
        // Force weather display
        if (!weatherData) fetchWeather();
        drawWeather(brightness);
        brightness = Math.min(15, brightness + 0.3);
      } else if (mode === 'star') {
        drawStars();
        drawTime(Math.max(brightness, 5));
        brightness = Math.min(15, brightness + 0.3);
      } else if (mode === 'hourly') {
        drawHourly(brightness);
        brightness = Math.min(15, brightness + 0.3);
      } else if (mode === 'daytime') {
        drawDaytime(brightness);
        brightness = Math.min(15, brightness + 0.3);
      }

      // Ambient noise overlay
      if (brightness < 8 && mode !== 'sleep') {
        for (let i = 0; i < 5; i++) {
          const x = Math.floor(Math.random() * 256);
          const y = Math.floor(Math.random() * 64);
          ctx.fillStyle = gray(1);
          ctx.fillRect(x, y, 1, 1);
        }
      }

      breathPhase += 0.02;
      requestAnimationFrame(render);
    }

    // Button handlers
    document.getElementById('btnWake').addEventListener('click', async () => {
      mode = 'wake';
      if (!weatherData) await fetchWeather();
      status.textContent = '显示模式';
    });

    document.getElementById('btnSleep').addEventListener('click', () => {
      mode = 'sleep';
      status.textContent = '待机模式';
    });

    document.getElementById('btnStar').addEventListener('click', () => {
      mode = 'star';
      brightness = 10;
      status.textContent = '星辰模式';
    });

    document.getElementById('btnWeather').addEventListener('click', async () => {
      mode = 'weather';
      weatherData = { loading: true };
      await fetchWeather();
      status.textContent = `${weatherData.city} ${weatherData.temp}° ${weatherData.conditionLabel} 降水${weatherData.rain_prob}%`;
    });

    document.getElementById('btnHourly').addEventListener('click', async () => {
      if (hourlyForecast.length === 0) {
        status.textContent = '加载中...';
        await fetchWeather();
      }
      mode = 'hourly';
      status.textContent = '12小时预报';
    });

    document.getElementById('btnDaytime').addEventListener('click', async () => {
      if (hourlyForecast.length === 0) {
        status.textContent = '加载中...';
        await fetchWeather();
      }
      mode = 'daytime';
      status.textContent = '日间天气 8:00-20:00';
    });

    // Keyboard: press any key to wake
    document.addEventListener('keydown', () => {
      mode = 'wake';
      status.textContent = '显示模式';
    });

    document.addEventListener('keyup', () => {
      mode = 'sleep';
      status.textContent = '待机模式';
    });

    // Start
    initStars();
    fetchWeather();
    render();
  </script>
</body>
</html>
